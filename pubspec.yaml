name: cartographer
description: Auto-discover and visualize a Flutter app's navigation graph as an interactive sitemap. Dev-only.
version: 0.2.0
repository: https://github.com/imkiptoo/cartographer
issue_tracker: https://github.com/imkiptoo/cartographer/issues

topics:
  - flutter
  - visualization
  - navigation
  - sitemap
  - developer-tools

environment:
  sdk: ^3.4.0

executables:
  cartographer:

dependencies:
  analyzer: ^13.0.0
  args: ^2.5.0
  path: ^1.9.0
  watcher: ^1.1.0
  yaml: ^3.1.2

dev_dependencies:
  lints: ">=4.0.0 <7.0.0"
  test: ^1.25.0
