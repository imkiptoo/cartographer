version: 2
updates:
  # Cartographer itself
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)

  # Demo app deps
  - package-ecosystem: pub
    directory: /example
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps-example)

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(ci)
